<script defer src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=7f7233882da446d38b874bbef14298bd"></script>
<script>
  window.MathJax = {
    options: {
	enableMenu: false,
	menuOptions: {
      settings: {
        assistiveMml: false,   // true to enable assistive MathML
        collapsible: false,   // true to enable collapsible math
        explorer: false      // true to enable the expression explorer
      },
	processHtmlClass: "math"
    }
    },
    loader: {
      // 关键：既然已经集成了，这里必须为空，防止它去 assets 找组件
      load: []
    },
    tex: {
      packages: { '[+]': ['mhchem'] },
      displayMath: [['$$', '$$']],
      inlineMath: [['$', '$']]
    },


startup: {
  pageReady: () => {
    const mathElements = document.querySelectorAll('.math');

    if (mathElements.length === 0) {
      return;
    }


    const processMath = (el) => {
      if (el.dataset.mathProcessed === "true") return;
      el.dataset.mathProcessed = "true";


        MathJax.typesetPromise([el])
          .then(() => {

            const containers = el.querySelectorAll('mjx-container');

            containers.forEach(container => {

              container.style.fontSize = '100%';

              const mathWidth = container.scrollWidth;
              const parentWidth = container.parentNode.offsetWidth;

              if (mathWidth > parentWidth) {
                const scale = Math.floor((parentWidth / mathWidth) * 95);
                container.style.fontSize = scale + '%';
                container.style.display = 'inline-block';
              }

            });

            observer.unobserve(el);

          })
          .catch(err => {
            console.error('MathJax Error:', err);
            el.dataset.mathProcessed = "false";
          });

    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          processMath(entry.target);
        }
      });
    }, {
      rootMargin: '200px',
      threshold: 0.01
    });

    mathElements.forEach(el => observer.observe(el));


    // resize 自适应
    let resizeTimer;

    window.addEventListener('resize', () => {

      clearTimeout(resizeTimer);

      resizeTimer = setTimeout(() => {

        document.querySelectorAll('mjx-container').forEach(container => {

          container.style.fontSize = '100%';

          const mathWidth = container.scrollWidth;
          const parentWidth = container.parentNode.offsetWidth;

          if (mathWidth > parentWidth) {
            container.style.fontSize =
              Math.floor((parentWidth / mathWidth) * 95) + '%';
          }

        });

      }, 300);

    });

  }
}
  };

</script>


<script defer src="/es5/mathjax-full-integrated.js"></script>

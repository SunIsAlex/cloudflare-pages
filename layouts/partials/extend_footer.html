<script defer src="https://www.desmos.com/api/v1.11.4/calculator.js?apiKey=7f7233882da446d38b874bbef14298bd"></script>
<script>
window.initCopyCode = function() {
    document.querySelectorAll('pre > code').forEach((codeblock) => {
        const container = codeblock.parentNode.parentNode;

        // 防止 SPA 模式下重复添加按钮
        if (container.querySelector('.copy-code')) return;
                                                                                                                         const copybutton = document.createElement('button');
        copybutton.classList.add('copy-code');
        copybutton.innerText = '{{- i18n "code_copy" | default "copy" -}}';

        copybutton.addEventListener('click', () => {
            if ('clipboard' in navigator) {
                navigator.clipboard.writeText(codeblock.textContent);
                copybutton.innerText = '{{- i18n "code_copied" | default "copied!" -}}';
                setTimeout(() => {
                    copybutton.innerText = '{{- i18n "code_copy" | default "copy" -}}';
                }, 2000);
            }
        });

        // 适配 PaperMod 的多种代码块结构
        if (container.classList.contains("highlight")) {
            container.appendChild(copybutton);
        } else if (codeblock.parentNode.parentNode.parentNode.parentNode.parentNode.nodeName == "TABLE") {
            codeblock.parentNode.parentNode.parentNode.parentNode.parentNode.appendChild(copybutton);
        } else {
            codeblock.parentNode.appendChild(copybutton);
        }
    });
}

// 2. 初始页面加载执行
initCopyCode();
// 定义一个全局初始化函数，方便 Swup 调用
window.initDesmosInstances = window.initDesmosInstances || function() {
    if (typeof Desmos === 'undefined') {
        setTimeout(window.initDesmosInstances, 200);
        return;
    }
    
    document.querySelectorAll('.desmos-container').forEach(container => {
        // 防止重复初始化
        if (container.classList.contains('desmos-initialized')) return;
        
        const calc = Desmos.GraphingCalculator(container, {
            expressions: true,
	    settingsMenu: false,
            zoomButtons: false,
            expressionsTopbar: true
        });

        const funcs = container.dataset.funcs.split(/[\s\|\,]+/).filter(s => s.trim());
        const colors = ["#1f77b4", "#ff7f0e", "#2ca02c", "#d62728", "#9467bd", "#8c564b"];

        funcs.forEach((latex, i) => {
            calc.setExpression({ id: 'f' + i, latex: latex, color: colors[i % colors.length] });
        });

        calc.setMathBounds({
            left: parseFloat(container.dataset.xmin),
            right: parseFloat(container.dataset.xmax),
            bottom: parseFloat(container.dataset.ymin),
            top: parseFloat(container.dataset.ymax)
        });

        container.classList.add('desmos-initialized');
    });
};

// 首次加载依然执行一次
window.initDesmosInstances();

</script>

<script defer src="https://www.desmos.com/api/v1.11.4/calculator.js?apiKey=7f7233882da446d38b874bbef14298bd"></script>
{{ $id := .Get "id" | default (printf "calc-%d" now.UnixNano) }}
<div class="desmos-container" 
     id="desmos-{{ $id }}" 
     data-desmos-id="{{ $id }}"
     data-funcs="{{ .Get "funcs" | safeJS }}"
     data-xmin="{{ .Get "xmin" | default -10 }}"
     data-xmax="{{ .Get "xmax" | default 10 }}"
     data-ymin="{{ .Get "ymin" | default -10 }}"
     data-ymax="{{ .Get "ymax" | default 10 }}"
     style="width:100%; height:500px; border:2px solid #ccc;">
</div>

<script>
// 定义一个全局初始化函数，方便 Swup 调用
window.initDesmosInstances = window.initDesmosInstances || function() {
    if (typeof Desmos === 'undefined') {
        setTimeout(window.initDesmosInstances, 200);
        return;
    }
    
    document.querySelectorAll('.desmos-container').forEach(container => {
        // 防止重复初始化
        if (container.classList.contains('desmos-initialized')) return;
        
        const calc = Desmos.GraphingCalculator(container, {
            expressions: true,
            zoomButtons: true,
            expressionsTopbar: true
        });

        const funcs = container.dataset.funcs.split(/[\s\|\,]+/).filter(s => s.trim());
        const colors = ["#1f77b4", "#ff7f0e", "#2ca02c", "#d62728", "#9467bd", "#8c564b"];

        funcs.forEach((latex, i) => {
            calc.setExpression({ id: 'f' + i, latex: latex, color: colors[i % colors.length] });
        });

        calc.setMathBounds({
            left: parseFloat(container.dataset.xmin),
            right: parseFloat(container.dataset.xmax),
            bottom: parseFloat(container.dataset.ymin),
            top: parseFloat(container.dataset.ymax)
        });

        container.classList.add('desmos-initialized');
    });
};

// 首次加载依然执行一次
window.initDesmosInstances();
</script>
